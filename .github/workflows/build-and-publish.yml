name: Build and Publish CI Images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      image:
        description: 'Image to build (all, base, arm, sim, m33mu, powerpc, riscv, aarch64, x86, renode)'
        required: false
        default: 'all'

env:
  REGISTRY: ghcr.io
  OWNER: wolfssl

jobs:
  base:
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.image == 'all' ||
      github.event.inputs.image == 'base'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push base
        uses: docker/build-push-action@v6
        with:
          context: base
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/wolfboot-ci-base:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/wolfboot-ci-base:latest

  arm:
    needs: base
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.image == 'all' ||
      github.event.inputs.image == 'arm'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push arm
        uses: docker/build-push-action@v6
        with:
          context: arm
          push: true
          build-args: BASE_TAG=${{ github.ref_name }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/wolfboot-ci-arm:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/wolfboot-ci-arm:latest

